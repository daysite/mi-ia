<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi ChatGPT</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input type="text" id="msg" placeholder="Escribe algo...">
  <button onclick="enviar()">Enviar</button>
</div>

<script>
async function enviar() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");
  const mensaje = input.value;

  if (!mensaje) return;

  // Mostrar mensaje usuario
  chat.innerHTML += `<div class="msg user">${mensaje}</div>`;
  input.value = "";

  // Llamar API
  const res = await fetch(`https://api.delirius.store/ia/gemini?query=${encodeURIComponent(mensaje)}`);
  const data = await res.json();

  const respuesta = data.data.result;

  // Mostrar respuesta IA
  chat.innerHTML += `<div class="msg bot">${respuesta}</div>`;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
