<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi IA</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  height: 100vh;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #020617;
  padding: 20px;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.new-chat {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* CHAT */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  max-width: 60%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

/* INPUT */
.input-box {
  display: flex;
  padding: 15px;
  border-top: 1px solid #1e293b;
  background: #020617;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>Mi IA</h2>
  <div class="new-chat" onclick="limpiarChat()">+ Nuevo chat</div>
</div>

<div class="main">
  <div class="chat" id="chat"></div>

  <div class="input-box">
    <input type="text" id="msg" placeholder="Escribe tu mensaje...">
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
function limpiarChat() {
  document.getElementById("chat").innerHTML = "";
}

async function enviar() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");
  const mensaje = input.value;

  if (!mensaje) return;

  // mensaje usuario
  chat.innerHTML += `<div class="msg user">${mensaje}</div>`;
  input.value = "";

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`https://api.delirius.store/ia/gemini?query=${encodeURIComponent(mensaje)}`);
    const data = await res.json();

    const respuesta = data.data.result;

    // mensaje IA
    chat.innerHTML += `<div class="msg bot">${respuesta}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += `<div class="msg bot">Error al conectar con la IA</div>`;
  }
}
</script>

</body>
</html>
