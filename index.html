<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Daniel AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial;
}

body {
  background: black;
  color: white;
  height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 70px;
  background: #111;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* START SCREEN */
.start {
  margin: auto;
  width: 80%;
  max-width: 900px;
}

.start h2 {
  font-size: 20px;
  color: #aaa;
  margin-bottom: 10px;
}

.start h1 {
  font-size: 48px;
  font-weight: 500;
  margin-bottom: 30px;
}

/* INPUT GRANDE */
.input-big {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-big input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  font-size: 18px;
  outline: none;
}

.icon {
  opacity: 0.7;
  cursor: pointer;
}

/* BOTONES */
.suggestions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.suggestions button {
  background: #1a1a1a;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

/* CHAT */
.chat {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.msg {
  max-width: 60%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

/* INPUT CHAT */
.input-chat {
  display: none;
  padding: 15px;
  border-top: 1px solid #222;
}

.input-chat input {
  width: 100%;
  padding: 15px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

/* loading */
.loading {
  opacity: 0.6;
  font-style: italic;
}
</style>

</head>

<body>

<div class="sidebar"></div>

<div class="main">

  <!-- INICIO -->
  <div class="start" id="start">
    <h2>Hi Daniel</h2>
    <h1>Where should we start?</h1>

    <div class="input-big">
      <span class="icon">＋</span>
      <input id="startInput" placeholder="Ask Daniel AI"
        onkeydown="if(event.key==='Enter') iniciar()">
      <span class="icon">🎤</span>
    </div>

    <div class="suggestions">
      <button onclick="quick('Crea una imagen')">🖼️ Create image</button>
      <button onclick="quick('Haz música')">🎸 Create music</button>
      <button onclick="quick('Enséñame algo')">📘 Help me learn</button>
      <button onclick="quick('Motívame')">✨ Boost my day</button>
      <button onclick="quick('Escribe algo')">✍️ Write anything</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <div class="input-chat" id="inputChat">
    <input id="msg" placeholder="Escribe tu mensaje..."
      onkeydown="if(event.key==='Enter') enviar()">
  </div>

</div>

<script>
function quick(texto) {
  document.getElementById("startInput").value = texto;
  iniciar();
}

function iniciar() {
  const val = document.getElementById("startInput").value;
  if (!val) return;

  document.getElementById("start").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("inputChat").style.display = "block";

  document.getElementById("msg").value = val;
  enviar();
}

async function enviar() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");
  const mensaje = input.value;

  if (!mensaje) return;

  chat.innerHTML += `<div class="msg user">${mensaje}</div>`;
  input.value = "";

  const id = Date.now();
  chat.innerHTML += `<div class="msg bot loading" id="load-${id}">Escribiendo...</div>`;

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);

  try {
    const res = await fetch(`https://api.delirius.store/ia/gemini?query=${encodeURIComponent(mensaje)}`, {
      signal: controller.signal
    });

    clearTimeout(timeout);

    const data = await res.json();
    let respuesta = data.data.result;

    respuesta = "🤖 Daniel AI:\n" + respuesta;

    document.getElementById(`load-${id}`).remove();

    const div = document.createElement("div");
    div.className = "msg bot";
    chat.appendChild(div);

    escribir(respuesta, div);

  } catch {
    document.getElementById(`load-${id}`).remove();
    chat.innerHTML += `<div class="msg bot">⚠️ Error o demora</div>`;
  }

  chat.scrollTop = chat.scrollHeight;
}

function escribir(texto, el) {
  let i = 0;
  const int = setInterval(() => {
    el.textContent += texto[i];
    i++;
    if (i >= texto.length) clearInterval(int);
  }, 10);
}
</script>

</body>
</html>
