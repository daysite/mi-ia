<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi IA PRO</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial;
}

body {
  display: flex;
  height: 100vh;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #020617;
  padding: 20px;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.new-chat {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: 0.3s;
}
.new-chat:hover {
  background: #334155;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* PANTALLA INICIAL */
.start-screen {
  margin: auto;
  text-align: center;
  opacity: 0.8;
}

.start-screen h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

.start-screen input {
  width: 400px;
  max-width: 90%;
  padding: 14px;
  border-radius: 12px;
  border: none;
}

/* CHAT */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: none;
}

/* MENSAJES */
.msg {
  max-width: 60%;
  padding: 14px;
  margin: 12px 0;
  border-radius: 14px;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

/* INPUT */
.input-box {
  display: none;
  padding: 15px;
  border-top: 1px solid #1e293b;
  background: #020617;
}

.input-box input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.input-box button {
  margin-left: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* LOADING */
.loading {
  font-style: italic;
  opacity: 0.6;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>Mi IA</h2>
  <div class="new-chat" onclick="nuevoChat()">+ Nuevo chat</div>
</div>

<div class="main">

  <!-- INICIO -->
  <div class="start-screen" id="start">
    <h1>¿En qué quieres ayuda?</h1>
    <input id="startInput" placeholder="Escribe algo..."
      onkeydown="if(event.key==='Enter') iniciarDesdeInicio()">
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- INPUT -->
  <div class="input-box" id="inputBox">
    <input type="text" id="msg" placeholder="Escribe tu mensaje..."
      onkeydown="if(event.key==='Enter') enviar()">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script>
let historial = [];

function nuevoChat() {
  historial = [];
  document.getElementById("chat").innerHTML = "";
  document.getElementById("chat").style.display = "none";
  document.getElementById("inputBox").style.display = "none";
  document.getElementById("start").style.display = "block";
}

function iniciarDesdeInicio() {
  const input = document.getElementById("startInput");
  if (!input.value) return;

  document.getElementById("start").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("inputBox").style.display = "flex";

  document.getElementById("msg").value = input.value;
  input.value = "";

  enviar();
}

async function enviar() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");
  const mensaje = input.value;

  if (!mensaje) return;

  historial.push(mensaje);

  chat.innerHTML += `<div class="msg user">${mensaje}</div>`;
  input.value = "";

  // mensaje escribiendo...
  const loadingId = Date.now();
  chat.innerHTML += `<div class="msg bot loading" id="load-${loadingId}">Escribiendo...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`https://api.delirius.store/ia/gemini?query=${encodeURIComponent(mensaje)}`);
    const data = await res.json();

    const respuesta = data.data.result;

    document.getElementById(`load-${loadingId}`).remove();

    chat.innerHTML += `<div class="msg bot">${respuesta}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch {
    document.getElementById(`load-${loadingId}`).remove();
    chat.innerHTML += `<div class="msg bot">Error al conectar</div>`;
  }
}
</script>

</body>
</html>
